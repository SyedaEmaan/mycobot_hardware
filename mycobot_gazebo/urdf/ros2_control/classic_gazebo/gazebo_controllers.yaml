controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: True

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - link1_to_link2
      - link2_to_link3
      - link3_to_link4
      - link4_to_link5
      - link5_to_link6
      - link6_to_link6flange
    command_interfaces:
      - position # This ensures MoveIt sends Positions, not Torques
    state_interfaces:
      - position
      - velocity
