# Controller configuration for L2/L3/L4 testing of MyCobotHardware against
# the mycobot URDF. Joint name MUST match the URDF — for mycobot it's
# link1_to_link2, NOT joint_1.

controller_manager:
  ros__parameters:
    update_rate: 100          # Hz — match the EtherCAT 10 ms cycle

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


forward_position_controller:
  ros__parameters:
    joints:
      - link1_to_link2
      # - link2_to_link3
      # - link3_to_link4
      # - link4_to_link5
      # - link5_to_link6
      # - link6_to_link6flange
    interface_name: position


joint_trajectory_controller:
  ros__parameters:
    joints:
      - link1_to_link2
      # - link2_to_link3
      # - link3_to_link4
      # - link4_to_link5
      # - link5_to_link6
      # - link6_to_link6flange

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

      # --- ADD THIS SECTION ---
    interpolation_method: splines # Ensures smooth, faster movement
    
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 1.0
      link1_to_link2:
        trajectory: 0.5
        goal: 0.05

    # These define the maximum speed the controller will command
    joint_limits:
      link1_to_link2:
        has_velocity_limits: true
        max_velocity: 2.0        # Increase this (rad/s). Try 1.0 or 2.0.
        has_acceleration_limits: true
        max_acceleration: 3.0    # Increase this (rad/s^2). Try 5.0 or 10.0.
    # -----------------------

    state_publish_rate: 100.0
    action_monitor_rate: 20.0


